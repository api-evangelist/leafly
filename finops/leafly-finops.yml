  unit: months
  aggregation: sum
  dimensions:
  - account
  - location
  - market
principles:
- name: Visibility
  description: Track the monthly subscription per dispensary location and market; API calls themselves carry no line-item cost.
- name: Allocation
  description: Map each subscription to the store location and market it lists so cost aligns to the revenue that listing drives.
- name: Optimization
  description: Right-size the subscription tier to the markets and products that matter; use included deals to drive orders without added cost; automate menu sync to protect the value of the listing.
- name: Accountability
  description: Assign an owner per location to review subscription spend against orders and traffic driven through Leafly.
