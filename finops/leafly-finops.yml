description: >-
  FinOps view of Leafly spend. Leafly's APIs are not billed on usage - there is
  no per-call charge for the Menu Integration or Order APIs. Cost is driven by
  the flat Leafly for Retailers subscription that grants the listing and API
  entitlement, quoted by sales and tiered by market, product selection, and
  service level (roughly hundreds to thousands of USD per month). POS / system-
  of-record providers integrate the APIs at no separate fee through Partner Ops.
  For a retailer, the relevant cost signals are the monthly subscription and the
  business value of orders and traffic driven, rather than metered API
  consumption.
notes: >-
  Subscription rates are not public and are not reconciled here. There is no
  usage meter to allocate; costs are a fixed monthly subscription. Verify tiers
  with Leafly sales during reconciliation.
