name: Leafly
kind: company
description: >-
  Leafly is a cannabis discovery marketplace where consumers research strains,
  read reviews, and browse and order from licensed dispensaries and brands.
  For retailers and point-of-sale (POS) providers, Leafly exposes a documented
  Menu Integration API that keeps a dispensary's Leafly menu in near-real-time
  sync with its system of record - pushing product/item data, variants,
  inventory, pricing, strain, and cannabinoid information - and a partner-gated
  Order (Reservations) API that lets a POS system receive and manage online
  orders placed on Leafly. The Menu Integration API is publicly documented
  (OpenAPI via ReDoc) across V1, V1.1, and V2; the Order API's full
  specification sits behind Cloudflare Access and is available to onboarded
  partners. Actual use requires a paid Leafly for Retailers subscription and a
  Leafly-issued menu integration key - there is no self-serve public signup or
  consumer-facing data API.
